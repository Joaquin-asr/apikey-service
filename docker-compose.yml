services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "SqlPass123!"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SqlPass123!' -No -Q 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    command: >
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "SqlPass123!" -No
      -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = N'apikeys') CREATE DATABASE apikeys"
    restart: "no"

  apikey-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=apikeys;encrypt=false;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "SqlPass123!"
      VALID_CLIENT_ID: CLIENT-001
      RENEWED_APIKEY_ID: RENEW-SECRET-KEY-001
      ENCRYPTION_KEY: A1B2C3D4E5F60708
      EXPIRATION_DAY: MONDAY
      RENEW_COOLDOWN_HOURS: "24"
    volumes:
      - ./logs:/app/logs
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  sqlserver_data:
