server.port=8080
spring.application.name=apikey-service

spring.threads.virtual.enabled=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=apikeys;encrypt=false;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sql}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

apikey.valid-client-id=${VALID_CLIENT_ID:CLIENT-001}
apikey.expiration-day=${EXPIRATION_DAY:MONDAY}
apikey.renewed-apikey-id=${RENEWED_APIKEY_ID:RENEW-SECRET-KEY-001}
apikey.renew-cooldown-hours=${RENEW_COOLDOWN_HOURS:24}
encryption.secret-key=${ENCRYPTION_KEY:A1B2C3D4E5F60708}

spring.datasource.hikari.maximum-pool-size=60
app.logging.directory=${LOG_DIR:logs}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=apikey-service
info.app.version=0.0.1-SNAPSHOT
info.app.description=API Key generation, validation and renewal service

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
